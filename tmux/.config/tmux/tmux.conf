unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g prefix C-s

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

unbind [ 
bind [ copy-mode -H

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel  "xclip -in -selection clipboard"
set-window-option -g mode-style 'reverse'

set -g pane-border-status off

set-option -g automatic-rename off
set-option -g allow-rename off
set-option -g status-position top

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -ga terminal-overrides ",xterm-256color:Tc"
set -g focus-events on
set -g base-index 1 
set -g status-right-length 10
set -g status-left-length 100
set -g status-left ""
set-option -g status-style bg=#282a2e


#+--- tmux-prefix-highlight ---+
set -g @prefix_highlight_output_prefix "#[fg=brightcyan]#[bg=#282a2e]#[nobold]#[noitalics]#[nounderscore]#[bg=brightcyan]#[fg=#282a2e]"
set -g @prefix_highlight_output_suffix ""
set -g @prefix_highlight_copy_mode_attr "fg=brightcyan,bg=#161616,bold"
#+--------+
#+ Status +
#+--------+
#+--- Bars ---+
set -g status-left "#[fg=#282a2e,bg=#ebb244,bold] #S #[fg=#ebb244,bg=#282a2e,nobold,noitalics,nounderscore]"
set -g status-right "#[fg=#ebb244,bg=#282a2e,nobold,noitalics,nounderscore] #[fg=#282a2e,bg=#ebb244,bold] #H " 
set -g status-right-length 20

#+--- Windows ---+
set -g window-status-format "#[fg=#282a2e,bg=#707880,nobold,noitalics,nounderscore] #[fg=#c5c8c6,bg=#707880]#I #[fg=#c5c8c6,bg=#707880,nobold,noitalics,nounderscore] #[fg=#c5c8c6,bg=#707880]#W #F #[fg=#707880,bg=#282a2e,nobold,noitalics,nounderscore]"
set -g window-status-current-format "#[fg=#282a2e,bg=#f0c674,nobold,noitalics,nounderscore] #[fg=#282a2e,bg=#f0c674]#I #[fg=#282a2e,bg=#f0c674,nobold,noitalics,nounderscore] #[fg=#282a2e,bg=#f0c674]#W #F #[fg=#f0c674,bg=#282a2e,nobold,noitalics,nounderscore]"

set -g window-status-separator ""

run '~/.tmux/plugins/tpm/tpm'

bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"
